  <style>
    .notfound__tooth { animation: nf-float 3.4s cubic-bezier(0.16,1,0.3,1) infinite; transform-origin: center; }

    @keyframes nf-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes nf-blink { 0%,92%,100%{opacity:1} 95%{opacity:0.1} }
    @media (prefers-reduced-motion: reduce){ .notfound__tooth,.nf-eye{animation:none} }
  </style>

  <script>
    // Redirección automática a inicio (cualquier ruta inexistente acaba aquí en GitHub Pages)
    (function () {
      var n = 8;
      var el = document.getElementById("count");
      var t = setInterval(function () {
        n -= 1;
        if (el) el.textContent = n;
        if (n <= 0) { clearInterval(t); window.location.replace("/"); }
      }, 1000);
    })();
  </script>
